icons_format = "{icon}"

[theme]
theme = "native"

[icons]
icons = "awesome4"
[icons.overrides]
net_wireless = "\uE009"
net_wired = "\uE00D"
net_vpn = "⚧︎"
bat = ["\uE004", "\uE004", "\uE005", "\uE003"]
bat_charging = "\uE006"
memory_mem = "\uE00A"
disk_drive = "\uE00C"
cpu = "\uE00B"
cogs = "\uE008"
time = "\uE007"
volume = "\uE001"
volume_muted = "\uE002"
backlight = "\uE00E"

# https://greshake.github.io/i3status-rust/i3status_rs/blocks/index.html

# display active networkmanager connections
[[block]]
block = "custom"
format = "{$icon|}$text.pango-str()"
command = "nmcli -t -f NAME connection show --active | grep -v -x -E 'lo|docker0' | paste -s -d ' '"
interval = 10
hide_when_empty = true

[[block]]
block = "net"
format = "$icon{$signal_strength$frequency $ip}"
inactive_format = "$icon Down"
interval = 3

# not sure this is a good idea honestly
#[[block]]
#block = "external_ip"
#format = "$ip $city"
#with_network_manager = true # enabled by default
#use_ipv4 = true

[[block]]
block = "load"
format = "$icon$1m.eng(w:4)"

[[block]]
block = "cpu"
format = "$icon$utilization.eng(w:2)"
info_cpu = 20
warning_cpu = 90

[[block]]
block = "temperature"
format = "$icon$max"
interval = 10

[[block]]
block = "memory"
format = "$icon$mem_avail.eng(w:3)"
# whenever nixpkgs merges i think it was commit 2043, that adds range to formatting/formatter.rs
# not going to bother attempting to display swap until that time as it is pretty much always 0 unless crashing
#format = "$icon$mem_avail.eng(w:3)$swap_used.eng(range:1.., pad_with:' ')"
warning_mem = 70
critical_mem = 83

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 10
alert = 5.0
format = "$icon$available.eng(w:2)"

[[block]]
block = "battery"
format = "$icon$percentage"
charging_format = "$icon$percentage"
not_charging_format = "$icon$percentage"
empty_format = "$icon$percentage"
critical = 30

[[block]]
block = "sound"
format = "$icon$volume"
show_volume_when_muted = true

[[block]]
block = "backlight"
format = "$icon$brightness.eng(w:2)"
device = "intel_backlight"

#[[block]]
#block = "custom"
#format = "{$icon|}$text.pango-str()"
#command = "sed 's/  //' <(curl 'https://wttr.in/?format=1' -s)"
#interval = 600

[[block]]
block = "time"
interval = 5
format = "$timestamp.datetime(f:'%a %d/%m %R')"
